<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>A new way of working — Alex Cain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #eb5127;
      --cream:  #fcfaf0;
      --brown:  #7a6045;
      --dark:   #1c1208;
      --border: #e5d5be;
    }
    body {
      background: var(--cream);
      font-family: 'DM Sans', sans-serif;
      color: var(--brown);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }
    h1 {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 300;
      color: var(--orange);
      line-height: 1.05;
      letter-spacing: -2px;
      margin-bottom: 16px;
    }
    p {
      font-size: 18px;
      line-height: 28px;
      max-width: 480px;
      margin-bottom: 32px;
    }
    a {
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 1.24px;
      text-transform: uppercase;
      color: var(--brown);
      text-decoration: none;
      opacity: .6;
      transition: opacity .15s;
    }
    a:hover { opacity: 1; }
  </style>
</head>
<body>
  <script>
    if (!sessionStorage.getItem('mf-access')) {
      window.location.replace('index.html');
    }
  </script>

</body>
</html>
