<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alexandra Cain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-flamingo:    #EB5127;
      --color-rum-swizzle: #FCFAF0;
      --color-border:      #E5D5BE;
      --color-white:       #FFFFFF;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--color-rum-swizzle);
      font-family: "Inter", sans-serif;
      display: flex;
      align-items: stretch;
    }

    .frame {
      flex: 1;
      border: 1px solid var(--color-border);
      margin: 0;
      padding: 72px 48px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 24px;
    }

    .title-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    h1 {
      font-family: "Barlow Condensed", sans-serif;
      font-size: 50px;
      line-height: 52.5px;
      font-weight: 900;
      color: var(--color-flamingo);
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .subtitle {
      font-family: "Inter", sans-serif;
      font-size: 18px;
      line-height: 22.8px;
      font-weight: 400;
      color: #7A6045;
      max-width: 42ch;
    }

    .starburst {
      flex-shrink: 0;
      width: 64px;
      height: 64px;
      color: var(--color-flamingo);
    }

    @media (max-width: 600px) {
      .frame {
        padding: 24px;
      }

      h1 {
        font-size: 36px;
        letter-spacing: 0;
        line-height: 1;
      }

      .subtitle {
        font-size: 15px;
        max-width: 100%;
      }

      .starburst {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="frame">
    <div class="top-row">
      <div class="title-group">
        <h1>On its way&nbsp;....</h1>
        <p class="subtitle">I am busy Clauding to make my portfolio, will be done by mid May 2026</p>
      </div>

      <img class="starburst" src="Star.png" alt="" aria-hidden="true">
    </div>

  </main>
</body>
</html>
